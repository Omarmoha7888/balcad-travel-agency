<!doctype html>
<html lang="so">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Magaca rasmiga ah ee ka muuqanaya Google Search iyo Browser-ka -->
    <title>Balcad Travel & Tourism Agency - Tikidhada, Xajka, Cumrada iyo Fiisooyinka</title>
    
    <!-- Google Search Site Name Configuration (Si looga saaro magaca Vercel) -->
    <meta property="og:site_name" content="Balcad Travel Agency" />
    <meta property="og:title" content="Balcad Travel & Tourism Agency" />
    <meta property="og:description" content="Balcad Travel Agency - Wakaaladda ugu horreysa ee goynta tikidhada duulimaadyada, adeegyada Xajka, Cumrada, iyo fududeynta fiisooyinka adduunka oo dhan." />
    
    <!-- Logada rasmiga ah ee ka soo muuqanaysa raadinta google iyo tab-ka browserka -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta property="og:image" content="/logo.png" />

    <!-- Google Structured Data for Site Name (Habka rasmiga ah ee Google magaca ku aqoonsado) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Balcad Travel Agency",
      "alternateName": [
        "Balcad Travel", 
        "Balcad Travel & Tourism Agency"
      ],
      "url": "https://balcadtravel.vercel.app/"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
